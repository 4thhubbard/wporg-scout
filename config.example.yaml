# wporg-scout configuration
# Copy to config.yaml and edit. config.yaml is gitignored.

github:
  # Open issues are pulled from each of these repos.
  repos:
    - WordPress/wporg-main-2022
    - WordPress/wporg-news-2021
    - WordPress/wporg-learn
    - WordPress/wporg-pattern-directory
    - WordPress/wporg-translate
    - WordPress/openverse
  # Optional: only pull issues with these labels (omit to pull all open issues)
  # labels:
  #   - good-first-issue
  #   - help-wanted

trac:
  base_url: https://core.trac.wordpress.org
  # Default: dotorg-property components, not core dev work.
  # See https://core.trac.wordpress.org/wiki/TracQuery for query syntax.
  components:
    - "Site"
    - "Forums"
    - "Login & Authentication"
  status:
    - new
    - reopened
  max_age_days: 365

make_p2:
  # Disabled by default in v1 — P2 posts are mostly status updates, too noisy.
  # To enable, add sites to the list:
  #   sites:
  #     - https://make.wordpress.org/community/
  #     - https://make.wordpress.org/design/
  #     - https://make.wordpress.org/meta/
  sites: []
  lookback_days: 30
  pre_filter_patterns: []

# Optional. Filter which synced items get LLM-classified. Empty list (default)
# = classify everything. Non-empty = only items whose external_id starts with
# one of these prefixes get classified. Useful for focusing on the repos /
# sources you actually want to triage and skipping noise from others.
#
# Example: dotorg-property focus (skip openverse and other internal repos)
#   classify:
#     allowlist:
#       - WordPress/wporg-main-2022
#       - WordPress/wporg-news-2021
#       - WordPress/wporg-learn
#       - WordPress/wporg-pattern-directory
#       - WordPress/wporg-translate
#       - trac
#
# Items outside the allowlist remain in the DB unclassified — they don't show
# up in categorized digest sections, only in the unclassified count. You can
# always remove the allowlist later to back-fill them.
classify:
  allowlist: []

llm:
  provider: openrouter
  # Pick a fast/cheap model. Classification is short and structured.
  model: anthropic/claude-haiku-4.5
  # If you want to skip the LLM and just do keyword-rule classification, set
  # this to "rules" instead.
  # model: rules

# Where the local SQLite DB lives. Default: ./scout.db next to this config.
# db_path: ./scout.db
